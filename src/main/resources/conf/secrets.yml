#
# secrets utilizadas en 
# ambiente de desarrollo
#
#
dev:
   security:
      SECURITYPATH: /app/security/keygen
   ssl:
      KEYSTORE_PATH: /app/security/ssl/.apiseries.p12
      KEYSTORE_PASS: apiseries
   mongodb:
      NONGODB_URL: mongodb://localhost:27017
      NONGODB_DATABASE: gear-scout-accountant
      NONGODB_COLLECTION: scout_clients
   database:
      DATABSE_HOST:
      DATABSE_PORT:
      DATABASE_USER:
      DATABASE_PASS:
   smtp:
      SMTP_HOSTNAME:   
      SMTP_PORT:
      SMTP_USERNAME:
      SMTP_PASSWORD:
   mailjet:
      MAILJET_APIKEY:
      MAILJET_SECRETKEY:
   broker:
      qpid:
      rabbitmq:
      mosquitto:
      kafka:
    
#
# secrets utilizadas en 
# ambiente de qa
#
#
qa:
   security:
      SECURITYPATH: ${QA_SECURITYPATH}
   ssl:
      KEYSTORE_PATH: ${QA_KEYSTORE_PATH}
      KEYSTORE_PASS: ${QA_KEYSTORE_PASS}
   mongodb:
      NONGODB_URL: ${QA_MONGODB_URL}
      NONGODB_DATABASE: ${QA_MONGODB_DATABASE}
      NONGODB_COLLECTION: ${QA_MONGODB_COLLECTION} 
   database:
      DATABSE_HOST: ${QA_DATABSE_HOST}
      DATABSE_PORT: ${QA_DATABSE_PORT}
      DATABASE_USER: ${QA_DATABASE_USER}
      DATABASE_PASS: ${QA_DATABASE_PASS}
   smtp:
      SMTP_HOSTNAME: ${QA_SMTP_HOSTNAME}   
      SMTP_PORT: ${QA_SMTP_PORT}
      SMTP_USERNAME: ${QA_SMTP_USERNAME}
      SMTP_PASSWORD: ${QA_SMTP_PASSWORD}
   mailjet:
      MAILJET_APIKEY: ${QA_MAILJET_APIKEY}
      MAILJET_SECRETKEY: ${QA_MAILJET_SECRETKEY}
   broker:
      qpid:
      rabbitmq:
      mosquitto:
      kafka:

